<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>People Connections Connector</title>
    <link rel="stylesheet" href="/styles.css?v=20260501-14">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Local connector</p>
          <h1>People Connections</h1>
          <p class="summary">LinkedIn-safe profile auth, curated opportunities, and relationship-path enrichment.</p>
        </div>
        <section class="panel">
          <h2>Profile</h2>
          <div id="profileBlock" class="profile-block"></div>
          <div id="configMessage" class="config-message"></div>
          <div class="auth-actions">
            <a id="connectLinkedInButton" class="button primary" href="/auth/linkedin/start?authType=oidc">Connect LinkedIn</a>
            <button id="logoutButton" class="button secondary" type="button">Logout</button>
          </div>
        </section>
        <section class="panel">
          <div class="panel-header">
            <h2>Search</h2>
            <button id="resetSearchButton" class="button secondary compact" type="button">Reset</button>
          </div>
          <div class="linkedin-search">
            <label>Search jobs
              <input id="jobSearchInput" type="search" placeholder="Title, skill, or company">
            </label>
            <label>Location
              <input id="jobLocationInput" type="search" list="locationSuggestions" placeholder="City, state, country, or remote">
            </label>
            <datalist id="locationSuggestions"></datalist>
          </div>
          <div class="location-actions">
            <button id="profileLocationButton" class="small-button" type="button">Profile location</button>
            <button id="geoLocationButton" class="small-button" type="button">Current location</button>
          </div>
          <div class="linkedin-filters">
            <label>Date posted
              <select id="datePostedSelect">
                <option value="any">Any time</option>
                <option value="past-24h">Past 24 hours</option>
                <option value="past-week">Past week</option>
                <option value="past-month">Past month</option>
              </select>
            </label>
            <label>Experience level
              <select id="experienceSelect">
                <option value="any">Any level</option>
                <option value="associate">Associate</option>
                <option value="mid-senior">Mid-Senior level</option>
                <option value="director">Director</option>
                <option value="executive">Executive</option>
              </select>
            </label>
            <label>Workplace
              <select id="workplaceSelect">
                <option value="any">Any workplace</option>
                <option value="remote">Remote</option>
                <option value="hybrid">Hybrid</option>
                <option value="onsite">On-site</option>
              </select>
            </label>
            <label>Job type
              <select id="jobTypeSelect">
                <option value="any">Any type</option>
                <option value="full-time">Full-time</option>
                <option value="contract">Contract</option>
                <option value="part-time">Part-time</option>
              </select>
            </label>
            <label>Company
              <input id="companyFilterInput" type="search" placeholder="Company">
            </label>
            <label>Sort by
              <select id="sortSelect">
                <option value="relevance">Most relevant</option>
                <option value="recent">Most recent</option>
                <option value="network">Network strength</option>
              </select>
            </label>
          </div>
          <div id="industryOptions" class="option-chips" aria-label="Industry suggestions"></div>
          <button id="generateButton" class="button primary wide" type="button">Search jobs</button>
        </section>
        <section class="panel">
          <h2>Filters</h2>
          <label>Keyword
            <input id="keywordFilter" type="search" placeholder="Company, title, tag, contact">
          </label>
          <label>Minimum fit
            <input id="minFitFilter" type="range" min="0" max="100" value="0">
            <span id="minFitValue" class="range-value">0%</span>
          </label>
          <label>Connection degree
            <select id="degreeFilter">
              <option value="all">All degrees</option>
              <option value="1st">1st degree</option>
              <option value="2nd">2nd degree</option>
              <option value="3rd">3rd degree</option>
            </select>
          </label>
          <div class="button-row">
            <button id="applyFiltersButton" class="button primary" type="button">Apply</button>
            <button id="clearFiltersButton" class="button secondary" type="button">Clear</button>
          </div>
        </section>
      </aside>

      <section class="workspace">
        <header class="workspace-header">
          <div>
            <p class="eyebrow">Opportunity map</p>
            <h2>Curated jobs and connection paths</h2>
          </div>
          <div id="statusBadge" class="status-badge">Starting</div>
        </header>

        <nav class="tabs" aria-label="Workspace views">
          <button class="tab active" type="button" data-tab="opportunities">Opportunities</button>
          <button class="tab" type="button" data-tab="connections">Connections</button>
          <button class="tab" type="button" data-tab="setup">Setup</button>
        </nav>

        <div class="metrics">
          <div><span id="countMetric">0</span><small>roles</small></div>
          <div><span id="firstMetric">0</span><small>1st degree</small></div>
          <div><span id="secondMetric">0</span><small>2nd degree</small></div>
          <div><span id="thirdMetric">0</span><small>3rd degree</small></div>
        </div>

        <section id="opportunitiesView" class="tab-view active">
          <div class="results-toolbar">
            <div class="results-summary">
              <strong>Roles</strong>
              <span id="paginationInfo">Loading</span>
            </div>
            <div class="pagination-controls">
              <label class="page-size-label">Rows
                <select id="pageSizeSelect">
                  <option value="25">25</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
              </label>
              <button id="prevPageButton" class="small-button" type="button">Previous</button>
              <button id="nextPageButton" class="small-button" type="button">Next</button>
            </div>
          </div>
          <div id="opportunityList" class="opportunity-list"></div>
        </section>
        <section id="connectionsView" class="tab-view">
          <div id="connectionsList" class="connection-list"></div>
        </section>
        <section id="setupView" class="tab-view">
          <div id="setupPanel" class="setup-grid"></div>
        </section>
      </section>
    </main>
    <script src="/app.js?v=20260501-14" type="module"></script>
  </body>
</html>
